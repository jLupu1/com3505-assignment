<!DOCTYPE html>
<html class="font-[Inter]">

<head>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @layer base {
            button:not(:disabled),
            [role="button"]:not(:disabled) {
                cursor: pointer;
            }
        }
    </style>
</head>

<body class="flex flex-col gap-6 p-6 md:p-8 md:gap-8">
    <div class="flex flex-col gap-2 md:gap-1">
        <h1 class="font-bold text-4xl">COM3505 The Internet of Things</h1>
        <p>Benjamin Samuel-Gilbert and Jonathan Lupu</p>
    </div>
    <div class="gap-6 grid md:gap-8 md:grid-cols-3">
        <div class="border flex flex-col gap-8 p-8 rounded-md md:col-span-2">
            <div class="flex justify-between max-md:flex-col">
                <h2 class="font-bold text-lg">Live Temperature</h2>
                <p class="font-bold text-4xl">{temperature}</p>
            </div>
            <canvas class="rounded" id="chart"></canvas>
        </div>
        <div class="border flex flex-col gap-8 p-8 rounded-md">
            <h2 class="font-bold text-lg">LED Control</h2>
            <div class="gap-2 grid grid-cols-2">
                <button class="border font-bold p-2 rounded uppercase">All On</button>
                <button class="border font-bold p-2 rounded uppercase">All Off</button>
                <button class="border font-bold p-2 rounded uppercase">Pattern</button>
                <button class="border font-bold p-2 rounded uppercase">Pattern</button>
            </div>
            <div>
                <div class="border flex justify-center p-4 rounded">
                    <div class="gap-4 grid grid-cols-5">
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <!---->
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <!---->
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                        <button class="bg-white border rounded-full size-10"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const ctx = document.getElementById("chart");

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                }],
            },
            options: {
                plugins: {
                    legend: {
                        display: false,
                    },
                },
            },
        });
    </script>
</body>

</html>
