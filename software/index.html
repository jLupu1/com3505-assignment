<!DOCTYPE html>
<html class="font-[Inter]">

<head>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style type="text/tailwindcss">
        @layer base {
            button:not(:disabled),
            [role="button"]:not(:disabled) {
                cursor: pointer;
            }
        }
    </style>
    <title>COM3505 The Internet of Things</title>
</head>

<body class="flex flex-col gap-6 p-6 md:p-8 md:gap-8">
    <div class="flex flex-col max-md:gap-2">
        <h1 class="font-bold text-4xl">COM3505 The Internet of Things</h1>
        <p>Benjamin Samuel-Gilbert and Jonathan Lupu</p>
    </div>
    <div class="gap-6 grid md:gap-8 md:grid-cols-3">
        <div class="border flex flex-col gap-8 p-8 rounded-md md:col-span-2">
            <div class="flex justify-between max-md:flex-col">
                <h2 class="font-bold text-lg">Live Temperature</h2>
                <p class="font-bold text-4xl" id="temperature">{temperature}</p>
            </div>
            <canvas class="rounded" id="chart"></canvas>
        </div>
        <div class="border flex flex-col gap-8 p-8 rounded-md">
            <h2 class="font-bold text-lg">LED Control</h2>
            <div class="gap-2 grid grid-cols-2">
                <button class="border font-bold p-2 pattern rounded uppercase"
                    onclick="togglePattern(`pattern`, this)">Pattern</button>
                <button class="border font-bold p-2 pattern rounded uppercase"
                    onclick="togglePattern(`pattern`, this)">Pattern</button>
                <button class="border font-bold p-2 pattern rounded uppercase"
                    onclick="togglePattern(`pattern`, this)">Pattern</button>
                <button class="border font-bold p-2 pattern rounded uppercase"
                    onclick="togglePattern(`pattern`, this)">Pattern</button>
            </div>
            <div class="flex flex-col gap-2">
                <p class="font-semibold">Manual Control</p>
                <div class="gap-2 grid grid-cols-6">
                    <button class="aspect-square border LED rounded-full size-full" data-colour="0 255 0"
                        onclick="toggleLed(0, this)"></button>
                    <button class="aspect-square border LED rounded-full size-full" data-colour="0 255 0"
                        onclick="toggleLed(1, this)"></button>
                    <button class="aspect-square border LED rounded-full size-full" data-colour="255 255 0"
                        onclick="toggleLed(2, this)"></button>
                    <button class="aspect-square border LED rounded-full size-full" data-colour="255 255 0"
                        onclick="toggleLed(3, this)"></button>
                    <button class="aspect-square border LED rounded-full size-full" data-colour="255 0 0"
                        onclick="toggleLed(4, this)"></button>
                    <button class="aspect-square border LED rounded-full size-full" data-colour="255 0 0"
                        onclick="toggleLed(5, this)"></button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function setTemperature(temperature) {
            document.querySelector("#temperature").textContent = temperature;
            addPoint(temperature);
        }

        function setLedArray(ledArray) {
            document.querySelectorAll(".LED").forEach((b, i) => {
                b.dataset.value = ledArray[i];
                b.style.backgroundColor = `rgb(${b.dataset.colour} / ${ledArray[i]})`;
            });
        }

        function togglePattern(pattern, button) {
            if (button.style.backgroundColor == "black") {
                button.style.backgroundColor = "white";
                button.style.color = "black";
                websocket.send(JSON.stringify({
                    type: "pattern",
                    data: "none",
                }));
                return;
            }

            document.querySelectorAll(".pattern").forEach((b, i) => {
                b.style.backgroundColor = "white";
                b.style.color = "black";
            });
            button.style.backgroundColor = "black";
            button.style.color = "white";

            websocket.send(JSON.stringify({
                type: "pattern",
                data: pattern,
            }));
        }

        function clearPattern() {
            document.querySelectorAll(".pattern").forEach((b, i) => {
                b.style.backgroundColor = "white";
                b.style.color = "black";
            });
        }

        function toggleLed(i, button) {
            clearPattern();

            const opacity = Number(button.dataset.value) ? "0" : "1";
            button.dataset.value = opacity;
            button.style.backgroundColor = `rgb(${button.dataset.colour} / ${opacity})`;

            websocket.send(JSON.stringify({
                type: "toggle",
                data: i,
            }));
        }

        //

        const ctx = document.querySelector("#chart");
        const WINDOW_MS = 3 * 60 * 1000;

        const now = Date.now();
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{}],
            },
            options: {
                animation: false,
                plugins: {
                    legend: {
                        display: false,
                    },
                },
                scales: {
                    x: {
                        min: now - WINDOW_MS,
                        max: now,
                        type: 'time',
                        time: {
                            unit: 'minute',
                            stepSize: 1,
                            displayFormats: {
                                minute: 'HH:mm'
                            },
                        },
                    },
                },
            },
        });

        function addPoint(value) {
            const now = Date.now();

            chart.data.datasets[0].data.push({
                x: Date.now(),
                y: value
            });

            chart.options.scales.x.min = now - WINDOW_MS;
            chart.options.scales.x.max = now;

            chart.update();
        }

        function callback() {
            const now = Date.now();
            chart.options.scales.x.min = now - WINDOW_MS;
            chart.options.scales.x.max = now;
            chart.update();
            requestAnimationFrame(callback);
        }
        // requestAnimationFrame(callback);

        // setInterval(() => {
        //     setTemperature(Math.floor(Math.random() * 30));
        // }, 1000);

        //

        const websocket = new WebSocket("ws://127.0.0.1:6767/software");
        websocket.addEventListener("message", (event) => {
            console.log(event.data)
            message = JSON.parse(event.data);

            if (message.type == "temperature") {
                setTemperature(message.data);
            }
            if (message.type == "ledArray") {
                setLedArray(message.data.map((value) => value / 255));
            }
        });
    </script>
</body>

</html>
